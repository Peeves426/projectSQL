<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft</title>
    <meta name="description" content="Play Eaglercraft 1.8 Minecraft in your browser. No install needed." />
    <meta name="keywords" content="Minecraft, Eaglercraft, browser game, unblocked, Reid" />
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <p></p>
    <a id="linkButton" href="../../index.html">home</a>
    <p></p>
    <main class="hero">
        <div class="iframe-container">
            <iframe
                height="500"
                width="700"
                id="gameFrame"
                src="index1.html"
                scrolling="no"
                allow="fullscreen; keyboard"
                allowfullscreen
                title="Eaglercraft Game"
            ></iframe>
        </div>
        <div class="buttons">
            <button onclick="toggleFullScreen()">Full Screen</button>
        </div>
    </main>
    <script>
        const iframe = document.getElementById('gameFrame');
        function toggleFullScreen() {
            // Try to focus first
            iframe.contentWindow.focus();

            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.mozRequestFullScreen) {
                iframe.mozRequestFullScreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) {
                iframe.msRequestFullscreen();
            } else {
                alert("Fullscreen not supported in this browser.");
            }
            setTimeout(() => {
                iframe.contentWindow.focus();
            }, 500);
        }

        // Always focus iframe when clicked
        iframe.addEventListener('click', () => {
            iframe.contentWindow.focus();
        });
    </script>
    <script src="/storage/js/cloak.js"></script>
<script src="/storage/js/cloak-loader.js"></script>
</body>
</html>
