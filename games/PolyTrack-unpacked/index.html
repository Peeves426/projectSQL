<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squirrel Web</title>
    <meta name="description" content="Squirrel Website" />
    <meta name="keywords" content="Squirrel Gang" />
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <nav class="topbar">
        <div class="topbar-brand">Squirrel Gang</div>
        <div class="topbar-links">
            <a href="../../"><button>Home</button></a>
            <a href="../"><button>Games</button></a>
            <a href="../../tools/"><button>Tools</button></a>
        </div>
    </nav>
    <main class="hero">
        <div class="iframe-container">
            <iframe
                height="500"
                width="700"
                id="gameFrame"
                src="index1.html"
                scrolling="no"
                allow="fullscreen; keyboard"
                allowfullscreen
                title="Game"
            ></iframe>
        </div>
        <div class="buttons">
            <button onclick="toggleFullScreen()">Full Screen</button>
        </div>
    </main>
    <script>
        const iframe = document.getElementById('gameFrame');
        function toggleFullScreen() {
            iframe.contentWindow.focus();
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.mozRequestFullScreen) {
                iframe.mozRequestFullScreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) {
                iframe.msRequestFullscreen();
            } else {
                alert("Fullscreen not supported in this browser.");
            }
            setTimeout(() => {
                iframe.contentWindow.focus();
            }, 500);
        }
        iframe.addEventListener('click', () => {
            iframe.contentWindow.focus();
        });
    </script>
</body>
</html>
